name: rust
env:
  CARGO_TERM_COLOR: always
permissions:
  contents: write
on:
  push:
    branches: main
  pull_request:
    branches: null
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
          - host: windows-latest
            target: x86_64-pc-windows-msvc
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          # - host: ubuntu-24.04-arm
          #   target: aarch64-unknown-linux-musl
          - host: macos-latest
            target: aarch64-apple-darwin
    name: build - ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9
      - name: Install
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.settings.target }}
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            .cargo-cache
            target/
          key: ${{ matrix.settings.target }}-cargo-${{ matrix.settings.host }}
      - name: Run tests
        run: cargo test --verbose --workspace --profile release --target=${{ matrix.settings.target }} --exclude oxvg_napi --exclude oxvg_wasm
      - name: Build
        run: cargo build --verbose --bins --profile release --target=${{ matrix.settings.target }} --package oxvg
      - name: List
        run: ls -R
        shell: bash
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        if: ${{ contains(matrix.settings.target, 'windows') }}
        with:
          name: oxvg-${{ matrix.settings.target }}
          path: target/${{ matrix.settings.target }}/release/oxvg.exe
          if-no-files-found: error
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        if: ${{ !contains(matrix.settings.target, 'windows') }}
        with:
          name: oxvg-${{ matrix.settings.target }}
          path: target/${{ matrix.settings.target }}/release/oxvg
          if-no-files-found: error
  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: ls -R artifacts
        shell: bash
      - name: Publish eligiblity
        id: release_check
        run: |
          MSG="$(git log -1 --pretty=%B)"
          TAG="$(git tag --points-at HEAD | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$' | head -n1 || true)"
          if [[ "${{ github.ref }}" == "refs/heads/main" && "$MSG" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ && -n "$TAG" ]]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - name: Upload release assets
        if: steps.release_check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_check.outputs.tag }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
