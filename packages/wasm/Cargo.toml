[package]
name = "oxvg_wasm"
version = "0.0.3"
edition = "2021"
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "wasm bindings for oxvg"
publish = false

[lints]
workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
crate-type = ["cdylib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = [
  "-Oz",
  "--enable-bulk-memory",
  "--enable-reference-types",
  "--enable-nontrapping-float-to-int",
]

[features]
default = ["roxmltree"]
roxmltree = ["oxvg_ast/roxmltree"]
web_sys = ["oxvg_ast/web_sys"]

[dependencies]
oxvg_actions = { workspace = true, features = ["wasm"] }
oxvg_ast = { workspace = true, features = ["serialize"] }
oxvg_collections = { workspace = true }
oxvg_optimiser = { workspace = true, features = ["wasm"] }

console_error_panic_hook = "0.1.7"
getrandom = { workspace = true, features = ["wasm_js"] }
roxmltree = { workspace = true }
serde_json = { workspace = true }
serde-wasm-bindgen = { workspace = true }
tsify = { workspace = true }
typed-arena = { workspace = true }
wasm-bindgen = { workspace = true }
web-sys = { workspace = true, features = ["Document"] }

[dev-dependencies]
